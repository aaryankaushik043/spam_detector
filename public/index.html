<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Detector App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            background-color: #1e293b;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #334155;
        }
        h1 {
            color: #14b8a6;
            margin-bottom: 1rem;
        }
        p {
            line-height: 1.6;
            color: #94a3b8;
        }
        code {
            background-color: #0f172a;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Spam Detector App</h1>
        <p>This is a Streamlit application which must be run locally or hosted on Streamlit Community Cloud.</p>
        <p>To run this application locally, pull this repository and run:</p>
        <p><code>streamlit run app.py</code></p>
    </div>
</body>
</html>
